name: Skeleton Parity (Phase B-2b)

# Main-branch-only CLS gate. Runs the bounding-box parity spec that
# asserts every *.skeleton.tsx stays within 10% of its real sibling's
# rendered height. Deliberately NOT a PR gate — see
# docs/skeleton-parity-test-plan.md §117 for the reasoning.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'e2e/skeleton-parity.spec.ts'
      - 'playwright.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/skeleton-parity.yml'
  workflow_dispatch:

# One active run per branch; superseded pushes get cancelled so the
# latest commit owns the gate.
concurrency:
  group: skeleton-parity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  skeleton-parity:
    name: Playwright bounding-box gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # The spec uses page.route(...).continue() to delay real API
    # requests, so the dev server must be able to reach the backend. If
    # the secret is unset we fail fast rather than waiting for the
    # webServer boot to crash with a cryptic rewrite error.
    env:
      API_BACKEND_URL: ${{ secrets.API_BACKEND_URL }}
      CI: 'true'

    steps:
      - name: Verify required secrets
        run: |
          if [ -z "${API_BACKEND_URL}" ]; then
            echo "::error::API_BACKEND_URL secret is not set. Configure it in repo settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Read the Playwright version from the installed package so we
      # don't drift; the cache key pins to it.
      - name: Resolve Playwright version
        id: pw
        run: |
          version=$(node -p "require('@playwright/test/package.json').version")
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Chromium system deps (cache hit path)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run skeleton parity spec
        run: pnpm test:e2e:skeleton-parity

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14
